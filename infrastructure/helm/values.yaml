global:
  imageRegistry: ghcr.io
  imagePullSecrets: []
  storageClass: ""

replicaCount: 2

services:
  apiGateway:
    image: your-org/api-gateway
    tag: latest
    port: 3000
    replicas: 2
    resources:
      requests: { cpu: 100m, memory: 128Mi }
      limits: { cpu: 500m, memory: 512Mi }
  authService:
    image: your-org/auth-service
    tag: latest
    port: 3002
    replicas: 2
  metadataService:
    image: your-org/metadata-service
    tag: latest
    port: 3001
    replicas: 2
  dataAccessLayer:
    image: your-org/data-access-layer
    tag: latest
    port: 3003
    replicas: 2

secrets:
  jwtSecret: ""          # set via --set secrets.jwtSecret=xxx or Vault
  dbPassword: ""
  redisPassword: ""

postgresql:
  enabled: true
  auth:
    database: platform
    username: platform
    existingSecret: platform-db-secret

redis:
  enabled: true
  auth:
    existingSecret: platform-redis-secret

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: api.platform.io
      paths: [{ path: /, pathType: Prefix, service: api-gateway }]
  tls:
    - secretName: platform-tls
      hosts: [api.platform.io]